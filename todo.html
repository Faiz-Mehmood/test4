<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TO-DO — Faiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<script src="auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060d0a; --surface: #0a1510; --border: #122010;
    --accent: #00e5a0; --accent2: #00b4d8; --text: #e2f5ec; --muted: #2a5040;
  }
  body { background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;cursor:none;overflow-x:hidden; }
  #cursor { transition:opacity 0.15s,width 0.15s,height 0.15s;width:12px;height:12px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen; }
  #cursor-ring { width:36px;height:36px;border:1.5px solid var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:0.4;transition:width 0.3s,height 0.3s; }
  body.on-link #cursor { width:20px;height:20px;opacity:1; }
  body.on-link #cursor-ring { width:52px;height:52px;opacity:0.8; }
  #grid-bg { position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0; }
  .orb { position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0; }
  .orb-1 { width:500px;height:500px;background:#00e5a0;top:-200px;left:-150px;opacity:0.07; }
  .orb-2 { width:350px;height:350px;background:#00b4d8;bottom:-100px;right:-100px;opacity:0.08; }

  nav { position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:0.8rem;justify-content:space-between;padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);background:rgba(6,13,10,0.8);backdrop-filter:blur(20px); }
  .nav-logo { font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px var(--accent);margin-right:auto; }
  .back-btn { font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:3px;color:var(--muted);text-decoration:none;transition:color 0.2s;padding:0.4rem 0.8rem;border:1px solid var(--border);border-radius:6px; }
  .back-btn:hover { color:var(--accent);border-color:var(--accent); }

  main { position:relative;z-index:1;padding:7rem 2rem 8rem;max-width:720px;margin:0 auto; }
  .page-header { margin-bottom:2rem;opacity:0; }
  .page-tag { font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:5px;color:var(--accent);margin-bottom:0.5rem; }
  h1 { font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,5rem);letter-spacing:5px;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }

  .stats { display:flex;gap:1rem;margin-bottom:2rem;opacity:0; }
  .stat { flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;text-align:center; }
  .stat-val { font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--accent); }
  .stat-label { font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:3px;color:var(--muted);margin-top:2px; }

  .progress-wrap { margin-bottom:2rem;opacity:0; }
  .progress-label { font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:3px;color:var(--muted);margin-bottom:0.5rem;display:flex;justify-content:space-between; }
  .progress-bar { height:4px;background:var(--surface);border-radius:10px;overflow:hidden;border:1px solid var(--border); }
  .progress-fill { height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:10px;transition:width 0.5s cubic-bezier(.4,0,.2,1); }

  .filter-tabs { display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem;opacity:0; }
  .ftab { font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:2px;padding:0.4rem 0.9rem;border:1px solid var(--border);border-radius:8px;cursor:none;background:transparent;color:var(--muted);transition:all 0.2s; }
  .ftab.active,.ftab:hover { border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,0.08); }
  /* Custom tab — collapses to label, expands on hover to show icons */
  .custom-tab-wrap { position:relative;display:inline-flex; }
  .custom-tab-btn { font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:2px;padding:0.4rem 0.9rem;border:1px solid var(--border);border-radius:8px;cursor:none;background:transparent;color:var(--muted);transition:all 0.25s;display:flex;align-items:center;gap:0;overflow:hidden;white-space:nowrap; }
  .custom-tab-btn.active { border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,0.08); }
  .custom-tab-btn:not(.active):hover { border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,0.08); }
  .tab-icon-group { display:flex;gap:0.2rem;max-width:0;overflow:hidden;opacity:0;transition:max-width 0.25s ease,opacity 0.2s ease,margin-left 0.25s ease;margin-left:0; }
  .custom-tab-wrap:hover .tab-icon-group { max-width:60px;opacity:1;margin-left:0.4rem; }
  .custom-tab-btn.active ~ .tab-icon-group,
  .custom-tab-wrap:has(.custom-tab-btn.active) .tab-icon-group { max-width:0;opacity:0;margin-left:0; }
  .tab-act { background:rgba(6,13,10,0.85);border:1px solid var(--border);cursor:none;font-size:0.65rem;padding:2px 5px;border-radius:5px;transition:color 0.15s,border-color 0.15s;color:var(--muted);line-height:1.4; }
  .tab-act.edit:hover { color:var(--accent);border-color:var(--accent); }
  .tab-act.del:hover { color:#ff4d6d;border-color:#ff4d6d; }

  .add-row { display:flex;gap:0.7rem;margin-bottom:1.5rem; }
  .add-input { flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s; }
  .add-input:focus { border-color:var(--accent); }
  .priority-select { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.75rem 0.8rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:0.6rem;outline:none;cursor:none;transition:border-color 0.2s; }
  .priority-select:focus { border-color:var(--accent); }
  .add-todo-btn { padding:0.75rem 1.3rem;background:transparent;border:1px solid var(--accent);border-radius:10px;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:none;transition:background 0.2s; }
  .add-todo-btn:hover { background:rgba(0,229,160,0.1); }

  #todo-list { display:flex;flex-direction:column;gap:0.6rem;opacity:0; }
  .todo-item { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;transition:border-color 0.2s,opacity 0.2s;position:relative; }
  .todo-item:hover { border-color:rgba(0,229,160,0.3); }
  .todo-item.done { opacity:0.45; }
  .todo-check { width:24px;height:24px;border:2px solid var(--border);border-radius:8px;cursor:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;background:transparent; }
  .todo-check.clickable:hover { border-color:var(--accent); }
  .todo-check.checked { background:var(--accent);border-color:var(--accent); }
  .todo-check.checked::after { content:'✓';color:#060d0a;font-size:0.8rem;font-weight:700; }
  .todo-check.readonly { cursor:default;pointer-events:none; }
  .todo-text { flex:1;font-size:0.88rem; }
  .todo-item.done .todo-text { text-decoration:line-through;color:var(--muted); }
  .priority-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
  .priority-dot.high { background:#ff4d6d; }
  .priority-dot.med { background:#ff8c00; }
  .priority-dot.low { background:var(--muted); }
  .todo-date { font-family:'Space Mono',monospace;font-size:0.5rem;color:var(--muted);flex-shrink:0; }
  .todo-actions { display:flex;gap:0.3rem;flex-shrink:0;opacity:0;transition:opacity 0.15s; }
  .todo-item:hover .todo-actions { opacity:1; }
  .todo-act { background:rgba(6,13,10,0.85);border:1px solid var(--border);cursor:none;font-size:0.72rem;padding:3px 7px;border-radius:6px;transition:color 0.15s,border-color 0.15s,background 0.15s;color:var(--muted);line-height:1.4; }
  .todo-act.edit:hover { color:var(--accent);border-color:var(--accent);background:rgba(0,229,160,0.08); }
  .todo-act.del:hover { color:#ff4d6d;border-color:#ff4d6d;background:rgba(255,77,109,0.08); }
  .todo-check-none { width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted); }

  .empty { text-align:center;padding:3rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:3px; }
  .clear-btn { font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:3px;padding:0.4rem 0.9rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:none;transition:all 0.2s;margin-bottom:1rem; }
  .clear-btn:hover { border-color:#ff4d6d;color:#ff4d6d; }
  .sync-indicator { position:fixed;bottom:2rem;left:2rem;z-index:300;font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:3px;color:var(--muted);background:rgba(6,13,10,0.92);border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.9rem;pointer-events:none;transition:color 0.3s; }
  .sync-indicator.saving { color:var(--accent2); }
  .sync-indicator.synced { color:var(--accent); }

  .save-bar { position:fixed;bottom:2rem;right:2rem;z-index:200;display:flex;gap:0.8rem;align-items:center; }
  .save-btn { font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;padding:0.7rem 1.8rem;background:var(--accent);border:none;border-radius:12px;color:#fff;cursor:none;box-shadow:0 0 24px rgba(0,229,160,0.3);transition:opacity 0.2s,box-shadow 0.2s;font-weight:700; }
  .save-btn:hover { opacity:0.85;box-shadow:0 0 36px rgba(0,229,160,0.5); }
  .save-toast { font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:3px;color:var(--accent);opacity:0;transition:opacity 0.4s; }
  .save-toast.show { opacity:1; }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <div class="nav-logo">✅ TO-DO LIST</div>
  <a class="back-btn" href="index.html">← HUB</a>
</nav>

<main>
  <div class="page-header">
    <div class="page-tag">// TASK MANAGER</div>
    <h1>TO-DO LIST</h1>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-label">TOTAL</div></div>
    <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-label">DONE</div></div>
    <div class="stat"><div class="stat-val" id="s-left">0</div><div class="stat-label">LEFT</div></div>
  </div>

  <div class="progress-wrap" id="prog-wrap">
    <div class="progress-label"><span>PROGRESS</span><span id="prog-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="filter-tabs" id="filter-tabs">
    <!-- Rendered dynamically by JS -->
  </div>

  <div class="add-row owner-only" id="add-row">
    <input class="add-input" id="todo-input" placeholder="Add a new task..." onkeydown="if(event.key==='Enter')addTodo()"/>
    <select class="priority-select" id="priority-sel">
      <option value="low">LOW</option>
      <option value="med" selected>MED</option>
      <option value="high">HIGH</option>
    </select>
    <button class="add-todo-btn" onclick="addTodo()">ADD</button>
  </div>

  <button class="clear-btn owner-only" id="clear-btn" onclick="clearDone()">CLEAR COMPLETED</button>
  <div id="todo-list"></div>
</main>

<!-- Edit todo modal -->
<div id="edit-todo-modal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(6,13,10,0.9);backdrop-filter:blur(10px);align-items:center;justify-content:center;">
  <div style="background:#0a1510;border:1px solid #122010;border-radius:16px;padding:2rem;width:90%;max-width:500px;">
    <div style="font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:#00e5a0;margin-bottom:1rem;font-size:1.2rem;">EDIT TASK</div>
    <input id="edit-todo-text" placeholder="Task description..." style="width:100%;background:#060d0a;border:1px solid #122010;border-radius:8px;padding:0.7rem 1rem;color:#e2f5ec;font-family:'DM Sans';font-size:0.88rem;outline:none;margin-bottom:0.8rem;display:block;"/>
    <select id="edit-todo-priority" style="width:100%;background:#060d0a;border:1px solid #122010;border-radius:8px;padding:0.7rem 1rem;color:#e2f5ec;font-family:'Space Mono',monospace;font-size:0.7rem;outline:none;margin-bottom:1rem;display:block;">
      <option value="low">LOW PRIORITY</option>
      <option value="med">MED PRIORITY</option>
      <option value="high">HIGH PRIORITY</option>
    </select>
    <div style="display:flex;gap:0.7rem;justify-content:flex-end;">
      <button onclick="closeEditTodoModal()" style="padding:0.5rem 1rem;background:transparent;border:1px solid #122010;border-radius:8px;color:#2a5040;font-family:'Bebas Neue';font-size:0.9rem;letter-spacing:2px;cursor:pointer;">CANCEL</button>
      <button onclick="confirmEditTodo()" style="padding:0.5rem 1.2rem;background:#00e5a0;border:none;border-radius:8px;color:#060d0a;font-family:'Bebas Neue';font-size:0.9rem;letter-spacing:2px;cursor:pointer;font-weight:700;">SAVE TASK</button>
    </div>
  </div>
</div>

<!-- Add/edit custom tab modal -->
<div id="tab-modal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(6,13,10,0.9);backdrop-filter:blur(10px);align-items:center;justify-content:center;">
  <div style="background:#0a1510;border:1px solid #122010;border-radius:16px;padding:2rem;width:90%;max-width:400px;">
    <div id="tab-modal-head" style="font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:#00e5a0;margin-bottom:0.4rem;font-size:1.2rem;">ADD FILTER TAB</div>
    <div style="font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:3px;color:#2a5040;margin-bottom:1rem;">FILTER BY KEYWORD IN TASK TEXT</div>
    <input id="tab-label-inp" placeholder="Tab label (e.g. URGENT)" style="width:100%;background:#060d0a;border:1px solid #122010;border-radius:8px;padding:0.65rem 1rem;color:#e2f5ec;font-family:'Space Mono',monospace;font-size:0.7rem;letter-spacing:2px;outline:none;margin-bottom:0.7rem;display:block;" onkeydown="if(event.key==='Enter')document.getElementById('tab-filter-inp').focus()"/>
    <input id="tab-filter-inp" placeholder="Filter value (e.g. URGENT or leave blank for all)" style="width:100%;background:#060d0a;border:1px solid #122010;border-radius:8px;padding:0.65rem 1rem;color:#e2f5ec;font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;margin-bottom:1rem;display:block;" onkeydown="if(event.key==='Enter')confirmTabModal()"/>
    <div style="display:flex;gap:0.7rem;justify-content:flex-end;">
      <button onclick="closeTabModal()" style="padding:0.5rem 1rem;background:transparent;border:1px solid #122010;border-radius:8px;color:#2a5040;font-family:'Bebas Neue';font-size:0.9rem;letter-spacing:2px;cursor:pointer;">CANCEL</button>
      <button onclick="confirmTabModal()" style="padding:0.5rem 1.2rem;background:#00e5a0;border:none;border-radius:8px;color:#060d0a;font-family:'Bebas Neue';font-size:0.9rem;letter-spacing:2px;cursor:pointer;font-weight:700;">SAVE TAB</button>
    </div>
  </div>
</div>

<div class="save-bar owner-only">
  <span class="save-toast" id="save-toast">SAVED ✓</span>
  <button class="save-btn" onclick="saveTodos()">SAVE TASKS</button>
</div>

<script>
  const cursor=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  document.addEventListener('mouseover',e=>{ if(e.target.closest('a,button,input,textarea,select')) document.body.classList.add('on-link'); else document.body.classList.remove('on-link'); });
  function animCursor(){cursor.style.left=mx+'px';cursor.style.top=my+'px';rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animCursor);}
  animCursor();

  const loggedIn = isLoggedIn();
  let todos = [];
  let filter = 'all';

  function today() { return new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }

  // ── Firestore listener ─────────────────────────────────────────────────────
  dbListen('hub', 'todos', data => {
    if (data && Array.isArray(data.list)) {
      todos = data.list;
      if (data.customTabs) customTabs = data.customTabs;
    } else {
      todos = [
        {id:1,text:'Complete Computer Science revision',priority:'high',done:false,date:today()},
        {id:2,text:'Go to the gym - Push day',priority:'med',done:false,date:today()},
        {id:3,text:'Review pseudocode exercises',priority:'high',done:false,date:today()},
        {id:4,text:'Read chapter 4 notes',priority:'low',done:false,date:today()},
      ];
    }
    renderFilterTabs();
    render();
    const si=document.getElementById('sync-ind');if(si){si.className='sync-indicator synced';si.textContent='SYNCED ✓';}
  });

  // SYSTEM TABS — always shown, never editable/deletable
  const SYSTEM_TABS = [
    {key:'all',label:'ALL'},
    {key:'active',label:'ACTIVE'},
    {key:'done',label:'DONE'},
  ];
  // Custom tabs saved to Firebase
  let customTabs = [
    {key:'high',label:'HIGH',filterKey:'high'},
    {key:'med',label:'MED',filterKey:'med'},
  ];

  function renderFilterTabs() {
    const container = document.getElementById('filter-tabs');
    container.innerHTML = '';

    // System tabs — plain, no icons
    SYSTEM_TABS.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'ftab' + (filter===t.key?' active':'');
      btn.textContent = t.label;
      btn.onclick = () => setFilter(t.key, btn);
      container.appendChild(btn);
    });

    // Custom tabs — collapsible: icons appear on hover, hidden when active
    customTabs.forEach((t,i) => {
      const wrap = document.createElement('div');
      wrap.className = 'custom-tab-wrap';

      const btn = document.createElement('button');
      btn.className = 'custom-tab-btn' + (filter===t.key?' active':'');
      btn.textContent = t.label;
      btn.onclick = () => {
        // Clicking sets filter — which re-renders, collapsing the icons
        setFilter(t.key, btn);
      };
      wrap.appendChild(btn);

      if (loggedIn) {
        const iconGroup = document.createElement('div');
        iconGroup.className = 'tab-icon-group';

        const editBtn = document.createElement('button');
        editBtn.className = 'tab-act edit';
        editBtn.textContent = '✏️';
        editBtn.title = 'Edit tab';
        editBtn.onclick = (e) => { e.stopPropagation(); openTabModal(i); };

        const delBtn = document.createElement('button');
        delBtn.className = 'tab-act del';
        delBtn.textContent = '🗑';
        delBtn.title = 'Delete tab';
        delBtn.onclick = (e) => { e.stopPropagation(); deleteCustomTab(i); };

        iconGroup.appendChild(editBtn);
        iconGroup.appendChild(delBtn);
        wrap.appendChild(iconGroup);
      }

      container.appendChild(wrap);
    });

    // Add tab button
    if (loggedIn) {
      const addBtn = document.createElement('button');
      addBtn.className = 'ftab';
      addBtn.style.borderStyle = 'dashed';
      addBtn.textContent = '+ TAB';
      addBtn.onclick = () => openTabModal(-1);
      container.appendChild(addBtn);
    }
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
    if (btn) btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('todo-list');
    let filtered = [...todos];
    if (filter==='active') filtered=todos.filter(t=>!t.done);
    else if (filter==='done') filtered=todos.filter(t=>t.done);
    else {
      const ct = customTabs.find(t=>t.key===filter);
      if (ct) {
        if (ct.filterKey==='high'||ct.filterKey==='med'||ct.filterKey==='low') filtered=todos.filter(t=>t.priority===ct.filterKey);
        else if (ct.filterKey) filtered=todos.filter(t=>t.text.toLowerCase().includes(ct.filterKey.toLowerCase()));
      }
    }

    if (!filtered.length) { list.innerHTML='<div class="empty">NO TASKS HERE</div>'; updateStats(); return; }
    list.innerHTML = '';
    filtered.forEach(todo => {
      const el = document.createElement('div');
      el.className = 'todo-item'+(todo.done?' done':'');
      const checkHTML = loggedIn
        ? `<div class="todo-check clickable${todo.done?' checked':''}" onclick="toggle(${todo.id})"></div>`
        : (todo.done
            ? `<div class="todo-check checked" style="pointer-events:none"></div>`
            : `<div class="todo-check-none">—</div>`);
      const actionsHTML = loggedIn ? `
        <div class="todo-actions">
          <button class="todo-act edit" onclick="openEditTodo(${todo.id})" title="Edit">✏️</button>
          <button class="todo-act del" onclick="deleteTodo(${todo.id})" title="Delete">🗑</button>
        </div>` : '';
      el.innerHTML = `
        ${checkHTML}
        <div class="todo-text">${todo.text}</div>
        <div class="priority-dot ${todo.priority}"></div>
        <div class="todo-date">${todo.date}</div>
        ${actionsHTML}
      `;
      list.appendChild(el);
    });
    anime({targets:'.todo-item',opacity:[0,1],translateX:[-15,0],delay:anime.stagger(50),duration:350,easing:'easeOutQuart'});
    updateStats();
  }

  function toggle(id) {
    if (!loggedIn) return;
    const t = todos.find(t=>t.id===id);
    if (t) { t.done=!t.done; render(); }
  }

  function deleteTodo(id) {
    if (!loggedIn) return;
    todos = todos.filter(t=>t.id!==id);
    render();
  }

  function addTodo() {
    if (!loggedIn) return;
    const text = document.getElementById('todo-input').value.trim();
    if (!text) return;
    const priority = document.getElementById('priority-sel').value;
    todos.unshift({id:Date.now(),text,priority,done:false,date:today()});
    document.getElementById('todo-input').value='';
    render();
  }

  function clearDone() {
    if (!loggedIn) return;
    todos = todos.filter(t=>!t.done);
    render();
  }

  function updateStats() {
    const total=todos.length, done=todos.filter(t=>t.done).length, left=total-done;
    document.getElementById('s-total').textContent=total;
    document.getElementById('s-done').textContent=done;
    document.getElementById('s-left').textContent=left;
    const pct=total>0?Math.round((done/total)*100):0;
    document.getElementById('prog-pct').textContent=pct+'%';
    document.getElementById('prog-fill').style.width=pct+'%';
  }

  async function saveTodos() {
    if (!loggedIn) return;
    const si2=document.getElementById('sync-ind');if(si2){si2.className='sync-indicator saving';si2.textContent='SAVING...';}
    await dbSet('hub','todos',{list:todos,customTabs});
    if(si2){si2.className='sync-indicator synced';si2.textContent='SYNCED ✓';}
    const toast=document.getElementById('save-toast');
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2000);
    anime({targets:'.save-btn',scale:[1,0.95,1],duration:300,easing:'easeOutQuart'});
  }

  let editTodoId = null;
  function openEditTodo(id) {
    editTodoId = id;
    const t = todos.find(t=>t.id===id);
    if (!t) return;
    document.getElementById('edit-todo-text').value = t.text;
    document.getElementById('edit-todo-priority').value = t.priority;
    document.getElementById('edit-todo-modal').style.display = 'flex';
    setTimeout(()=>document.getElementById('edit-todo-text').focus(),100);
  }
  function closeEditTodoModal() { document.getElementById('edit-todo-modal').style.display = 'none'; editTodoId=null; }
  function confirmEditTodo() {
    if (!editTodoId) return;
    const t = todos.find(t=>t.id===editTodoId);
    if (!t) return;
    t.text = document.getElementById('edit-todo-text').value.trim() || t.text;
    t.priority = document.getElementById('edit-todo-priority').value;
    closeEditTodoModal();
    render();
  }

  let editTabIdx = -1;
  function openTabModal(i) {
    editTabIdx = i;
    document.getElementById('tab-modal-head').textContent = i >= 0 ? 'EDIT TAB' : 'ADD FILTER TAB';
    document.getElementById('tab-label-inp').value = i >= 0 ? customTabs[i].label : '';
    document.getElementById('tab-filter-inp').value = i >= 0 ? (customTabs[i].filterKey||''): '';
    document.getElementById('tab-modal').style.display = 'flex';
    setTimeout(()=>document.getElementById('tab-label-inp').focus(),100);
  }
  function closeTabModal() { document.getElementById('tab-modal').style.display = 'none'; editTabIdx=-1; }
  function confirmTabModal() {
    const label = document.getElementById('tab-label-inp').value.trim().toUpperCase();
    if (!label) { closeTabModal(); return; }
    const filterKey = document.getElementById('tab-filter-inp').value.trim();
    const key = 'custom_'+Date.now();
    const tab = {key: editTabIdx>=0?customTabs[editTabIdx].key:key, label, filterKey};
    if (editTabIdx >= 0) customTabs[editTabIdx] = tab;
    else customTabs.push(tab);
    closeTabModal();
    renderFilterTabs();
    render();
  }
  function deleteCustomTab(i) {
    customTabs.splice(i,1);
    if (!SYSTEM_TABS.find(t=>t.key===filter) && !customTabs.find(t=>t.key===filter)) {
      filter = 'all';
    }
    renderFilterTabs();
    render();
  }

  applyAuthUI();
  renderFilterTabs();
  anime.timeline({easing:'easeOutExpo'})
    .add({targets:'.page-header',opacity:[0,1],translateY:[30,0],duration:700})
    .add({targets:'#stats',opacity:[0,1],translateY:[20,0],duration:600},'-=300')
    .add({targets:'#prog-wrap',opacity:[0,1],duration:500},'-=200')
    .add({targets:'#filter-tabs',opacity:[0,1],translateY:[15,0],duration:500},'-=100')
    .add({targets:'#todo-list',opacity:[0,1],duration:400},'-=100');
  if (loggedIn) {
    anime({targets:'#add-row',opacity:[0,1],translateY:[15,0],duration:500,easing:'easeOutExpo'});
    anime({targets:'#clear-btn',opacity:[0,0.6],duration:400,easing:'easeOutExpo'});
  }
  anime({targets:'.orb-2',translateX:[0,-40,0],translateY:[0,30,0],duration:9000,easing:'easeInOutSine',loop:true});
</script>
<div class="sync-indicator synced" id="sync-ind">SYNCED ✓</div>
</body>
</html>
