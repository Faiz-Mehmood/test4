<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STUDY NOTES — Faiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<script src="auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07060f; --surface: #0d0b18; --border: #1a1530;
    --accent: #7b61ff; --accent2: #c77dff; --text: #ede8ff; --muted: #4a3c70;
  }
  body { background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;cursor:none;overflow-x:hidden; }
  #cursor { transition:opacity 0.15s,width 0.15s,height 0.15s;width:12px;height:12px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen; }
  #cursor-ring { width:36px;height:36px;border:1.5px solid var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:0.4;transition:width 0.3s,height 0.3s; }
  body.on-link #cursor { width:20px;height:20px;opacity:1; }
  body.on-link #cursor-ring { width:52px;height:52px;opacity:0.8; }
  #grid-bg { position:fixed;inset:0;background-image:linear-gradient(rgba(123,97,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(123,97,255,0.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0; }
  .orb { position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0; }
  .orb-1 { width:500px;height:500px;background:#7b61ff;top:-200px;right:-100px;opacity:0.1; }
  .orb-2 { width:350px;height:350px;background:#c77dff;bottom:-100px;left:-80px;opacity:0.08; }

  nav { position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:0.8rem;justify-content:space-between;padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);background:rgba(7,6,15,0.8);backdrop-filter:blur(20px); }
  .nav-logo { font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px var(--accent);margin-right:auto; }
  .back-btn { font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:3px;color:var(--muted);text-decoration:none;transition:color 0.2s;padding:0.4rem 0.8rem;border:1px solid var(--border);border-radius:6px; }
  .back-btn:hover { color:var(--accent);border-color:var(--accent); }

  main { position:relative;z-index:1;padding:7rem 2rem 8rem;max-width:1000px;margin:0 auto; }
  .page-header { margin-bottom:2.5rem;opacity:0; }
  .page-tag { font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:5px;color:var(--accent);margin-bottom:0.5rem; }
  h1 { font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,5rem);letter-spacing:5px;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }

  .sync-indicator { font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:3px;color:var(--muted);margin-bottom:1rem;opacity:0.6; }
  .layout { display:grid;grid-template-columns:260px 1fr;gap:1.5rem;opacity:0; }

  .sidebar { display:flex;flex-direction:column;gap:0.5rem; }
  .sub-title { font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:4px;color:var(--muted);margin-bottom:0.5rem;padding-left:0.5rem; }
  .subject-item { display:flex;flex-direction:column;gap:0; }
  .subject-btn { font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:2px;padding:0.6rem 0.8rem;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);cursor:none;text-align:left;transition:all 0.2s;width:100%;display:flex;align-items:center;justify-content:space-between;gap:0.4rem; }
  .subject-btn.active,.subject-btn:hover { border-color:var(--accent);color:var(--accent);background:rgba(123,97,255,0.1); }
  .sub-btn-left { display:flex;align-items:center;gap:0.5rem;flex:1;min-width:0; }
  .sub-btn-name { overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .note-count { font-size:0.5rem;opacity:0.6;flex-shrink:0; }
  .sub-btn-actions { display:flex;gap:0.15rem;flex-shrink:0; }
  .sub-icon-btn { background:transparent;border:none;cursor:none;color:#2a1e50;font-size:0.62rem;padding:2px 4px;border-radius:4px;transition:color 0.15s,background 0.15s;line-height:1;font-family:'Space Mono',monospace;letter-spacing:1px; }
  .subject-btn:hover .sub-icon-btn { color:#4a3c70; }
  .sub-icon-btn.edit:hover { color:var(--accent); }
  .sub-icon-btn.del:hover { color:#ff4d6d; }
  .new-subject-row { display:flex;gap:0.5rem;margin-top:0.5rem; }
  .new-sub-input { background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.7rem;color:var(--text);font-family:'Space Mono',monospace;font-size:0.6rem;outline:none;flex:1;transition:border-color 0.2s; }
  .new-sub-input:focus { border-color:var(--accent); }
  .new-sub-btn { padding:0.5rem 0.8rem;background:rgba(123,97,255,0.2);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:0.9rem;cursor:none;transition:background 0.2s; }
  .new-sub-btn:hover { background:rgba(123,97,255,0.35); }

  .notes-panel { display:flex;flex-direction:column;gap:1.2rem; }
  .notes-toolbar { display:flex;gap:0.7rem;align-items:center; }
  .notes-toolbar input { flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.6rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;transition:border-color 0.2s; }
  .notes-toolbar input:focus { border-color:var(--accent); }
  .notes-toolbar button { padding:0.6rem 1.1rem;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:none;transition:opacity 0.2s; }
  .notes-toolbar button:hover { opacity:0.8; }

  .note-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.5rem 1.2rem 1.5rem;position:relative;transition:border-color 0.2s; }
  .note-card:hover { border-color:rgba(123,97,255,0.4); }
  .note-header { display:flex;align-items:flex-start;justify-content:space-between;gap:0.8rem;margin-bottom:0.4rem; }
  .note-header-left { flex:1;min-width:0; }
  .note-subject-tag { font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:3px;color:var(--accent);margin-bottom:0.4rem; }
  .note-title-text { font-size:0.95rem;font-weight:500; }
  .note-card-actions { display:flex;gap:0.3rem;flex-shrink:0; }
  .note-act-btn { background:transparent;border:1px solid transparent;cursor:none;color:#2a1e50;font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:1px;padding:3px 7px;border-radius:6px;transition:all 0.15s;white-space:nowrap; }
  .note-card:hover .note-act-btn { color:#4a3c70;border-color:var(--border); }
  .note-act-btn.edit:hover { color:var(--accent);border-color:var(--accent);background:rgba(123,97,255,0.08); }
  .note-act-btn.del:hover { color:#ff4d6d;border-color:#ff4d6d;background:rgba(255,77,109,0.08); }
  .note-body { font-size:0.8rem;color:var(--muted);line-height:1.7;font-weight:300;white-space:pre-wrap;margin-top:0.6rem; }
  .note-photo { max-width:100%;border-radius:8px;margin-top:0.8rem;border:1px solid var(--border); }
  .note-date { font-family:'Space Mono',monospace;font-size:0.5rem;color:var(--muted);margin-top:0.7rem;opacity:0.5; }
  .empty-state { text-align:center;padding:3rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:3px; }

  .save-bar { position:fixed;bottom:2rem;right:2rem;z-index:200;display:flex;gap:0.8rem;align-items:center; }
  .save-btn { font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;padding:0.7rem 1.8rem;background:var(--accent);border:none;border-radius:12px;color:#fff;cursor:none;box-shadow:0 0 24px rgba(123,97,255,0.4);transition:opacity 0.2s,box-shadow 0.2s; }
  .save-btn:hover { opacity:0.85;box-shadow:0 0 36px rgba(123,97,255,0.6); }
  .save-toast { font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:3px;color:var(--accent);opacity:0;transition:opacity 0.4s; }
  .save-toast.show { opacity:1; }

  /* NOTE MODAL */
  .modal-overlay { display:none;position:fixed;inset:0;z-index:500;background:rgba(7,6,15,0.9);backdrop-filter:blur(10px);align-items:center;justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal-box { background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;width:90%;max-width:600px; }
  .modal-head { font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:var(--accent);margin-bottom:1rem;font-size:1.2rem; }
  .modal-input { width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.7rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;margin-bottom:0.8rem;display:block;transition:border-color 0.2s; }
  .modal-input:focus { border-color:var(--accent); }
  .modal-textarea { width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.7rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;resize:vertical;min-height:160px;display:block;margin-bottom:1rem;line-height:1.7;transition:border-color 0.2s; }
  .modal-textarea:focus { border-color:var(--accent); }
  .modal-btns { display:flex;gap:0.7rem;justify-content:flex-end; }
  .modal-cancel { padding:0.5rem 1rem;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;cursor:none;transition:all 0.2s; }
  .modal-cancel:hover { border-color:var(--accent);color:var(--accent); }
  .modal-save { padding:0.5rem 1.2rem;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;cursor:none;transition:opacity 0.2s; }
  .modal-save:hover { opacity:0.85; }

  @media (max-width:600px) { .layout { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <div class="nav-logo">📚 STUDY NOTES</div>
  <a class="back-btn" href="index.html">← HUB</a>
</nav>

<main>
  <div class="page-header">
    <div class="page-tag">// NOTES TRACKER</div>
    <h1>STUDY NOTES</h1>
  </div>
  <div class="sync-indicator" id="sync-ind">SYNCED ✓</div>
  <div class="layout" id="layout">
    <div class="sidebar">
      <div class="sub-title">SUBJECTS</div>
      <div id="subject-list"></div>
      <div class="new-subject-row owner-only">
        <input class="new-sub-input" id="new-sub-input" placeholder="New subject..." onkeydown="if(event.key==='Enter')addSubject()"/>
        <button class="new-sub-btn" onclick="addSubject()">+</button>
      </div>
    </div>
    <div class="notes-panel">
      <div class="notes-toolbar owner-only">
        <input id="note-title-input" placeholder="Note title..."/>
        <button onclick="openNoteModal()">+ NOTE</button>
      </div>
      <div id="notes-list"></div>
    </div>
  </div>
</main>

<!-- Note modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-head" id="modal-head-text">NEW NOTE</div>
    <input id="modal-title" placeholder="Title..." class="modal-input"/>
    <textarea id="modal-body" placeholder="Write your note here..." class="modal-textarea"></textarea>
    <div style="margin-bottom:1rem;">
      <div style="font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:3px;color:var(--muted);margin-bottom:0.5rem;">PHOTO (OPTIONAL)</div>
      <div style="display:flex;align-items:center;gap:0.8rem;">
        <label style="font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:2px;padding:0.45rem 0.9rem;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;transition:all 0.2s;display:inline-block;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
          UPLOAD PHOTO
          <input type="file" id="modal-photo-input" accept="image/*" style="display:none;" onchange="handleNotePhoto(this)"/>
        </label>
        <img id="modal-photo-preview" style="display:none;height:48px;width:auto;border-radius:6px;border:1px solid var(--border);" />
        <button id="modal-photo-clear" onclick="clearNotePhoto()" style="display:none;font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:2px;padding:0.35rem 0.6rem;border:1px solid var(--border);border-radius:6px;color:var(--muted);background:transparent;cursor:none;transition:all 0.2s;">REMOVE</button>
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">CANCEL</button>
      <button class="modal-save" onclick="saveNote()">SAVE NOTE</button>
    </div>
  </div>
</div>

<!-- Rename subject modal -->
<div class="modal-overlay" id="rename-sub-modal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(7,6,15,0.9);backdrop-filter:blur(10px);align-items:center;justify-content:center;">
  <div style="background:#0d0b18;border:1px solid #1a1530;border-radius:16px;padding:2rem;width:90%;max-width:420px;">
    <div style="font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:#7b61ff;margin-bottom:1rem;font-size:1.2rem;">RENAME SUBJECT</div>
    <input id="rename-sub-input" placeholder="New subject name..." style="width:100%;background:#07060f;border:1px solid #1a1530;border-radius:8px;padding:0.7rem 1rem;color:#ede8ff;font-family:'DM Sans';font-size:0.88rem;outline:none;margin-bottom:1rem;display:block;" onkeydown="if(event.key==='Enter')confirmRenameSubject()"/>
    <div style="display:flex;gap:0.7rem;justify-content:flex-end;">
      <button onclick="closeRenameSubModal()" style="padding:0.5rem 1rem;background:transparent;border:1px solid #1a1530;border-radius:8px;color:#4a3c70;font-family:'Bebas Neue';font-size:0.9rem;letter-spacing:2px;cursor:pointer;">CANCEL</button>
      <button onclick="confirmRenameSubject()" style="padding:0.5rem 1.2rem;background:#7b61ff;border:none;border-radius:8px;color:#fff;font-family:'Bebas Neue';font-size:0.9rem;letter-spacing:2px;cursor:pointer;">RENAME</button>
    </div>
  </div>
</div>

<!-- Edit note modal (reuses note modal) -->

<div class="save-bar owner-only">
  <span class="save-toast" id="save-toast">SAVED ✓</span>
  <button class="save-btn" onclick="saveData(true)">SAVE NOTES</button>
</div>

<script>
  const cursor=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  document.addEventListener('mouseover',e=>{ if(e.target.closest('a,button,input,textarea,select')) document.body.classList.add('on-link'); else document.body.classList.remove('on-link'); });
  function animCursor(){cursor.style.left=mx+'px';cursor.style.top=my+'px';rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animCursor);}
  animCursor();

  let subjects = ['Computer Science','Mathematics','Physics','General'];
  let notes = [];
  let currentSubject = subjects[0];

  // ── Firestore listener ─────────────────────────────────────────────────────
  dbListen('hub', 'study', data => {
    if (data) {
      subjects = data.subjects || subjects;
      notes = data.notes || [];
      if (!subjects.includes(currentSubject)) currentSubject = subjects[0];
    }
    renderSubjects();
    renderNotes();
    document.getElementById('sync-ind').textContent = 'SYNCED ✓';
  });

  async function saveData(showToast=false) {
    document.getElementById('sync-ind').textContent = 'SAVING...';
    await dbSet('hub','study',{subjects,notes});
    document.getElementById('sync-ind').textContent = 'SYNCED ✓';
    if (showToast) {
      const toast=document.getElementById('save-toast');
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'),2000);
      anime({targets:'.save-btn',scale:[1,0.95,1],duration:300,easing:'easeOutQuart'});
    }
  }

  function renderSubjects() {
    const list=document.getElementById('subject-list');
    list.innerHTML='';
    subjects.forEach(sub => {
      const count=notes.filter(n=>n.subject===sub).length;
      const item=document.createElement('div');
      item.className='subject-item';
      const btn=document.createElement('button');
      btn.className='subject-btn'+(sub===currentSubject?' active':'');
      const actionsHTML = isLoggedIn() ? `
        <span class="sub-btn-actions">
          <button class="sub-icon-btn edit" onclick="event.stopPropagation();openRenameSubModal('${sub.replace(/'/g,"\\'")}')">REN</button>
          <button class="sub-icon-btn del" onclick="event.stopPropagation();deleteSubject('${sub.replace(/'/g,"\\'")}')">DEL</button>
        </span>` : '';
      btn.innerHTML=`<span class="sub-btn-left"><span class="sub-btn-name">${sub}</span><span class="note-count">${count}</span></span>${actionsHTML}`;
      btn.onclick=()=>{ currentSubject=sub; renderSubjects(); renderNotes(); };
      item.appendChild(btn);
      list.appendChild(item);
    });
  }

  function deleteSubject(sub) {
    if (!isLoggedIn()||subjects.length<=1) return;
    subjects=subjects.filter(s=>s!==sub);
    notes=notes.filter(n=>n.subject!==sub);
    if (currentSubject===sub) currentSubject=subjects[0];
    saveData();
    renderSubjects(); renderNotes();
  }

  function renderNotes() {
    const list=document.getElementById('notes-list');
    const filtered=notes.filter(n=>n.subject===currentSubject);
    if (!filtered.length) { list.innerHTML='<div class="empty-state">NO NOTES YET<br>ADD YOUR FIRST NOTE ABOVE</div>'; return; }
    list.innerHTML='';
    filtered.forEach(note => {
      const real_idx=notes.indexOf(note);
      const card=document.createElement('div');
      card.className='note-card';
      const ownerActions = isLoggedIn() ? `
        <div class="note-card-actions">
          <button class="note-act-btn edit" onclick="openEditNote(${real_idx})">EDIT</button>
          <button class="note-act-btn del" onclick="deleteNote(${real_idx})">DEL</button>
        </div>` : '';
      const photoHTML = note.photo ? `<img class="note-photo" src="${note.photo}" alt="note image"/>` : '';
      card.innerHTML=`
        <div class="note-header">
          <div class="note-header-left">
            <div class="note-subject-tag">${note.subject}</div>
            <div class="note-title-text">${note.title}</div>
          </div>
          ${ownerActions}
        </div>
        <div class="note-body">${note.body}</div>
        ${photoHTML}
        <div class="note-date">${note.date}</div>
      `;
      list.appendChild(card);
    });
    anime({targets:'.note-card',opacity:[0,1],translateY:[15,0],delay:anime.stagger(60),duration:400,easing:'easeOutQuart'});
  }

  function addSubject() {
    if (!isLoggedIn()) return;
    const val=document.getElementById('new-sub-input').value.trim();
    if (!val||subjects.includes(val)) return;
    subjects.push(val); currentSubject=val;
    document.getElementById('new-sub-input').value='';
    saveData(); renderSubjects(); renderNotes();
  }

  let _notePhotoData = null;
  let _editingNoteIdx = -1;

  function handleNotePhoto(input) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      _notePhotoData = e.target.result;
      const prev = document.getElementById('modal-photo-preview');
      prev.src = _notePhotoData; prev.style.display = 'inline-block';
      document.getElementById('modal-photo-clear').style.display = 'inline-block';
    };
    reader.readAsDataURL(input.files[0]);
  }
  function clearNotePhoto() {
    _notePhotoData = null;
    document.getElementById('modal-photo-preview').style.display = 'none';
    document.getElementById('modal-photo-clear').style.display = 'none';
    document.getElementById('modal-photo-input').value = '';
  }

  function openNoteModal(editIdx=-1) {
    _editingNoteIdx = editIdx;
    clearNotePhoto();
    if (editIdx >= 0) {
      const n = notes[editIdx];
      document.getElementById('modal-head-text').textContent = 'EDIT NOTE';
      document.getElementById('modal-title').value = n.title;
      document.getElementById('modal-body').value = n.body;
      if (n.photo) {
        _notePhotoData = n.photo;
        const prev = document.getElementById('modal-photo-preview');
        prev.src = n.photo; prev.style.display = 'inline-block';
        document.getElementById('modal-photo-clear').style.display = 'inline-block';
      }
    } else {
      document.getElementById('modal-head-text').textContent = 'NEW NOTE';
      document.getElementById('modal-title').value = document.getElementById('note-title-input').value;
      document.getElementById('modal-body').value = '';
    }
    document.getElementById('modal').classList.add('open');
  }
  function closeModal() { document.getElementById('modal').classList.remove('open'); _editingNoteIdx=-1; }

  function openEditNote(i) { openNoteModal(i); }

  function saveNote() {
    const title=document.getElementById('modal-title').value.trim();
    const body=document.getElementById('modal-body').value.trim();
    if (!title) return;
    const noteData = {subject:currentSubject,title,body,photo:_notePhotoData||null,date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})};
    if (_editingNoteIdx >= 0) {
      notes[_editingNoteIdx] = {...notes[_editingNoteIdx], ...noteData};
    } else {
      notes.unshift(noteData);
    }
    saveData(); closeModal();
    document.getElementById('note-title-input').value='';
    renderSubjects(); renderNotes();
  }

  function deleteNote(i) {
    if (!isLoggedIn()) return;
    notes.splice(i,1); saveData(); renderSubjects(); renderNotes();
  }

  let renamingSubject = null;
  function openRenameSubModal(sub) {
    renamingSubject = sub;
    document.getElementById('rename-sub-input').value = sub;
    document.getElementById('rename-sub-modal').style.display = 'flex';
    setTimeout(()=>document.getElementById('rename-sub-input').focus(),100);
  }
  function closeRenameSubModal() { document.getElementById('rename-sub-modal').style.display = 'none'; renamingSubject = null; }
  function confirmRenameSubject() {
    if (!isLoggedIn() || !renamingSubject) return;
    const newName = document.getElementById('rename-sub-input').value.trim();
    if (!newName || newName===renamingSubject || subjects.includes(newName)) { closeRenameSubModal(); return; }
    subjects = subjects.map(s=>s===renamingSubject?newName:s);
    notes = notes.map(n=>n.subject===renamingSubject?{...n,subject:newName}:n);
    if (currentSubject===renamingSubject) currentSubject=newName;
    closeRenameSubModal();
    saveData(); renderSubjects(); renderNotes();
  }





  applyAuthUI();
  anime.timeline({easing:'easeOutExpo'})
    .add({targets:'.page-header',opacity:[0,1],translateY:[30,0],duration:700})
    .add({targets:'#layout',opacity:[0,1],translateY:[20,0],duration:700},'-=300');
  anime({targets:'.orb-1',translateX:[0,60,0],duration:10000,easing:'easeInOutSine',loop:true});
</script>
</body>
</html>
