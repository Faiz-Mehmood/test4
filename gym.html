<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GYM LOG — Faiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<script src="auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0608; --surface: #130d10; --border: #2a1520;
    --accent: #ff4d6d; --accent2: #ff8c00; --text: #f5e6ea; --muted: #5a3545;
  }
  body { background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;cursor:none; }
  #cursor { transition:opacity 0.15s,width 0.15s,height 0.15s;width:12px;height:12px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen; }
  #cursor-ring { width:36px;height:36px;border:1.5px solid var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:0.4;transition:width 0.3s,height 0.3s; }
  body.on-link #cursor { width:20px;height:20px;opacity:1; }
  body.on-link #cursor-ring { width:52px;height:52px;opacity:0.8; }
  #grid-bg { position:fixed;inset:0;background-image:linear-gradient(rgba(255,77,109,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,77,109,0.04) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0; }
  .orb { position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0; }
  .orb-1 { width:400px;height:400px;background:#ff4d6d;top:-100px;right:-100px;opacity:0.12; }
  .orb-2 { width:300px;height:300px;background:#ff8c00;bottom:-80px;left:-80px;opacity:0.1; }

  nav { position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:0.8rem;justify-content:space-between;padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);background:rgba(10,6,8,0.8);backdrop-filter:blur(20px); }
  .nav-logo { font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px var(--accent);margin-right:auto; }
  .back-btn { font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:3px;color:var(--muted);text-decoration:none;transition:color 0.2s;padding:0.4rem 0.8rem;border:1px solid var(--border);border-radius:6px; }
  .back-btn:hover { color:var(--accent);border-color:var(--accent); }

  main { position:relative;z-index:1;padding:7rem 2rem 6rem;max-width:900px;margin:0 auto; }
  .page-header { margin-bottom:3rem;opacity:0; }
  .page-tag { font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:5px;color:var(--accent);margin-bottom:0.5rem; }
  h1 { font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,5.5rem);letter-spacing:5px;line-height:1;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
  .page-sub { font-size:0.85rem;color:var(--muted);font-weight:300;margin-top:0.5rem;letter-spacing:1px; }

  /* STATS */
  .stats-row { display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;opacity:0; }
  .stat-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.5rem; }
  .stat-val { font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:var(--accent); }
  .stat-label { font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:3px;color:var(--muted);margin-top:2px; }

  /* DAY TABS */
  .day-tabs-wrap { margin-bottom:1.5rem;opacity:0; }
  .day-tabs { display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.7rem; }
  .day-tab { font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:2px;padding:0.5rem 1rem;border:1px solid var(--border);border-radius:8px;cursor:none;background:transparent;color:var(--muted);transition:all 0.2s;display:flex;align-items:center;gap:0.5rem; }
  .day-tab.active, .day-tab:hover { border-color:var(--accent);color:var(--accent);background:rgba(255,77,109,0.08); }
  .day-tab-del { background:transparent;border:none;cursor:none;color:var(--muted);font-size:0.7rem;padding:0 0 0 4px;opacity:0.4;transition:opacity 0.2s,color 0.2s;line-height:1; }
  .day-tab-del:hover { opacity:1;color:#ff4d6d; }

  /* ADD DAY ROW (owner only) */
  .day-mgmt-row { display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap; }
  .day-name-input { background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.7rem;color:var(--text);font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:2px;outline:none;width:130px;transition:border-color 0.2s; }
  .day-name-input:focus { border-color:var(--accent); }
  .day-add-btn { padding:0.4rem 0.9rem;background:transparent;border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:2px;cursor:none;transition:background 0.2s; }
  .day-add-btn:hover { background:rgba(255,77,109,0.1); }
  .day-rename-btn { padding:0.4rem 0.9rem;background:transparent;border:1px solid var(--muted);border-radius:8px;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:2px;cursor:none;transition:all 0.2s; }
  .day-rename-btn:hover { border-color:var(--accent2);color:var(--accent2); }

  /* WORKOUT PANEL */
  .workout-panel { background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;opacity:0; }
  .panel-head { display:grid;grid-template-columns:2fr 1fr 1fr 1fr 40px 40px 40px;padding:1rem 1.5rem;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:3px;color:var(--muted); }
  .exercise-row { display:grid;grid-template-columns:2fr 1fr 1fr 1fr 40px 40px 40px;padding:1rem 1.5rem;border-bottom:1px solid var(--border);align-items:center;transition:background 0.2s; }
  .exercise-row:last-child { border-bottom:none; }
  .exercise-row:hover { background:rgba(255,77,109,0.05); }
  .ex-name { font-size:0.88rem;font-weight:500; }
  .ex-muscle { font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:2px;color:var(--accent);margin-top:2px; }
  .ex-cell { font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--muted); }
  .done-btn { width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:none;display:flex;align-items:center;justify-content:center;font-size:0.7rem;transition:all 0.2s;color:var(--muted); }
  .done-btn.done { background:var(--accent);border-color:var(--accent);color:#fff; }
  .done-cell { display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:var(--muted); }
  .trash-btn { background:transparent;border:none;cursor:none;color:#3a2030;font-size:0.9rem;padding:4px;border-radius:6px;transition:color 0.2s,background 0.2s;display:flex;align-items:center;justify-content:center; }
  .trash-btn:hover { color:#ff4d6d;background:rgba(255,77,109,0.12); }

  /* ADD EXERCISE */
  .add-section { margin-top:2rem; }
  .add-title { font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:4px;color:var(--muted);margin-bottom:1rem; }
  .add-form { display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 1fr auto;gap:0.75rem;align-items:end; }
  .field { display:flex;flex-direction:column;gap:0.4rem; }
  .field label { font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:3px;color:var(--muted); }
  .field input { background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.8rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;transition:border-color 0.2s; }
  .field input:focus { border-color:var(--accent); }
  .add-btn { padding:0.6rem 1.2rem;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:none;transition:opacity 0.2s; }
  .add-btn:hover { opacity:0.85; }

  /* SAVE BAR */
  .save-bar { position:fixed;bottom:2rem;right:2rem;z-index:200;display:flex;gap:0.8rem;align-items:center; }
  .save-btn { font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;padding:0.7rem 1.8rem;background:var(--accent);border:none;border-radius:12px;color:#fff;cursor:none;box-shadow:0 0 24px rgba(255,77,109,0.4);transition:opacity 0.2s,box-shadow 0.2s; }
  .save-btn:hover { opacity:0.85;box-shadow:0 0 36px rgba(255,77,109,0.6); }
  .save-toast { font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:3px;color:var(--accent);opacity:0;transition:opacity 0.4s; }
  .save-toast.show { opacity:1; }

  /* MODAL */
  .modal-overlay { display:none;position:fixed;inset:0;z-index:600;background:rgba(10,6,8,0.92);backdrop-filter:blur(12px);align-items:center;justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal-box { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:90%;max-width:380px; }
  .modal-title { font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:4px;color:var(--accent);margin-bottom:1.2rem; }
  .modal-input { width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:0.7rem 1rem;color:var(--text);font-family:'Space Mono',monospace;font-size:0.7rem;letter-spacing:3px;outline:none;transition:border-color 0.2s;margin-bottom:1rem; }
  .modal-input:focus { border-color:var(--accent); }
  .modal-btns { display:flex;gap:0.7rem;justify-content:flex-end; }
  .modal-cancel { padding:0.5rem 1rem;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;cursor:none;transition:all 0.2s; }
  .modal-cancel:hover { border-color:var(--accent);color:var(--accent); }
  .modal-confirm { padding:0.5rem 1.2rem;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;cursor:none;transition:opacity 0.2s; }
  .modal-confirm:hover { opacity:0.85; }

  .edit-btn { background:transparent;border:none;cursor:none;color:#3a2030;font-size:0.85rem;padding:4px;border-radius:6px;transition:color 0.2s,background 0.2s;display:flex;align-items:center;justify-content:center; }
  .edit-btn:hover { color:var(--accent2);background:rgba(255,140,0,0.12); }
  .empty-day { text-align:center;padding:3rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:3px; }
  .sync-indicator { font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:3px;color:var(--muted);text-align:right;margin-bottom:0.5rem;opacity:0.6; }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <div class="nav-logo">🏋️ GYM LOG</div>
  <a class="back-btn" href="index.html">← HUB</a>
</nav>

<main>
  <div class="page-header">
    <div class="page-tag">// WORKOUT TRACKER</div>
    <h1>GYM LOG</h1>
    <p class="page-sub">Track your sets · reps · weights</p>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="stat-done">0</div><div class="stat-label">DONE TODAY</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-label">TOTAL EXERCISES</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-pct">0%</div><div class="stat-label">COMPLETION</div></div>
  </div>

  <div class="day-tabs-wrap" id="day-tabs-wrap">
    <div class="day-tabs" id="day-tabs"></div>
    <div class="day-mgmt-row owner-only" id="day-mgmt">
      <input class="day-name-input" id="new-day-input" placeholder="DAY NAME"/>
      <button class="day-add-btn" onclick="addDay()">+ ADD DAY</button>
      <button class="day-rename-btn" onclick="openRenameDay()">RENAME DAY</button>
    </div>
  </div>

  <div class="sync-indicator" id="sync-ind">SYNCED ✓</div>
  <div class="workout-panel" id="workout-panel">
    <div class="panel-head"><span>EXERCISE</span><span>SETS</span><span>REPS</span><span>KG</span><span>✓</span><span></span><span></span></div>
    <div id="exercise-list"></div>
  </div>

  <div class="add-section owner-only" id="add-section">
    <div class="add-title">— ADD EXERCISE —</div>
    <div class="add-form">
      <div class="field"><label>EXERCISE NAME</label><input id="ex-name" placeholder="e.g. Bench Press"/></div>
      <div class="field"><label>MUSCLE GROUP</label><input id="ex-muscle" placeholder="e.g. CHEST (optional)"/></div>
      <div class="field"><label>SETS</label><input id="ex-sets" placeholder="4" type="number"/></div>
      <div class="field"><label>REPS</label><input id="ex-reps" placeholder="10" type="number"/></div>
      <div class="field"><label>WEIGHT (KG)</label><input id="ex-kg" placeholder="60" type="number"/></div>
      <button class="add-btn" onclick="addExercise()">ADD</button>
    </div>
  </div>
</main>

<!-- Rename modal -->
<div class="modal-overlay" id="rename-modal">
  <div class="modal-box">
    <div class="modal-title">RENAME DAY</div>
    <input class="modal-input" id="rename-input" placeholder="NEW NAME" onkeydown="if(event.key==='Enter')confirmRename()"/>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeRenameModal()">CANCEL</button>
      <button class="modal-confirm" onclick="confirmRename()">RENAME</button>
    </div>
  </div>
</div>

<!-- Edit exercise modal -->
<div class="modal-overlay" id="edit-ex-modal">
  <div class="modal-box">
    <div class="modal-title">EDIT EXERCISE</div>
    <input class="modal-input" id="edit-ex-name" placeholder="Exercise name"/>
    <input class="modal-input" id="edit-ex-muscle" placeholder="Muscle group (e.g. CHEST)"/>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;margin-bottom:1rem;">
      <div>
        <div style="font-family:'Space Mono',monospace;font-size:0.48rem;letter-spacing:3px;color:var(--muted);margin-bottom:0.3rem;">SETS</div>
        <input class="modal-input" id="edit-ex-sets" type="number" placeholder="4" style="margin-bottom:0;"/>
      </div>
      <div>
        <div style="font-family:'Space Mono',monospace;font-size:0.48rem;letter-spacing:3px;color:var(--muted);margin-bottom:0.3rem;">REPS</div>
        <input class="modal-input" id="edit-ex-reps" type="number" placeholder="10" style="margin-bottom:0;"/>
      </div>
      <div>
        <div style="font-family:'Space Mono',monospace;font-size:0.48rem;letter-spacing:3px;color:var(--muted);margin-bottom:0.3rem;">KG</div>
        <input class="modal-input" id="edit-ex-kg" type="number" placeholder="60" style="margin-bottom:0;"/>
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="document.getElementById('edit-ex-modal').classList.remove('open')">CANCEL</button>
      <button class="modal-confirm" onclick="confirmEditExercise()">SAVE</button>
    </div>
  </div>
</div>

<div class="save-bar owner-only">
  <span class="save-toast" id="save-toast">SAVED ✓</span>
  <button class="save-btn" onclick="saveDay()">SAVE DAY</button>
</div>

<script>
  const cursor=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  document.addEventListener('mouseover',e=>{ if(e.target.closest('a,button,input,textarea,select')) document.body.classList.add('on-link'); else document.body.classList.remove('on-link'); });
  function animCursor(){cursor.style.left=mx+'px';cursor.style.top=my+'px';rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animCursor);}
  animCursor();

  const loggedIn = isLoggedIn();

  // ── State ──────────────────────────────────────────────────────────────────
  const DEFAULT_WORKOUTS = {
    PUSH: [{name:'Bench Press',muscle:'CHEST',sets:4,reps:8,kg:60},{name:'Overhead Press',muscle:'SHOULDERS',sets:3,reps:10,kg:40},{name:'Incline DB Press',muscle:'UPPER CHEST',sets:3,reps:10,kg:22},{name:'Lateral Raises',muscle:'DELTS',sets:3,reps:15,kg:10},{name:'Tricep Pushdown',muscle:'TRICEPS',sets:3,reps:12,kg:25}],
    PULL: [{name:'Deadlift',muscle:'BACK',sets:4,reps:5,kg:100},{name:'Pull-Ups',muscle:'LATS',sets:3,reps:8,kg:0},{name:'Barbell Row',muscle:'BACK',sets:3,reps:10,kg:60},{name:'Face Pulls',muscle:'REAR DELTS',sets:3,reps:15,kg:15},{name:'Bicep Curl',muscle:'BICEPS',sets:3,reps:12,kg:15}],
    LEGS: [{name:'Squat',muscle:'QUADS',sets:4,reps:8,kg:80},{name:'Romanian DL',muscle:'HAMSTRINGS',sets:3,reps:10,kg:60},{name:'Leg Press',muscle:'QUADS/GLUTES',sets:3,reps:12,kg:120},{name:'Leg Curl',muscle:'HAMSTRINGS',sets:3,reps:12,kg:40},{name:'Calf Raises',muscle:'CALVES',sets:4,reps:20,kg:60}],
    CARDIO: [{name:'Treadmill Run',muscle:'CARDIO',sets:1,reps:1,kg:0},{name:'Jump Rope',muscle:'FULL BODY',sets:5,reps:1,kg:0},{name:'Cycling',muscle:'CARDIO',sets:1,reps:1,kg:0}]
  };
  const DEFAULT_DAYS = Object.keys(DEFAULT_WORKOUTS);

  let gymData = null; // { days: ['PUSH',...], workouts: { PUSH: [...], ... } }
  let currentDay = null;
  let exercises = [];

  // ── Firestore listener ─────────────────────────────────────────────────────
  dbListen('hub', 'gym', data => {
    if (data) {
      gymData = data;
    } else {
      gymData = {
        days: DEFAULT_DAYS,
        workouts: {}
      };
      DEFAULT_DAYS.forEach(d => {
        gymData.workouts[d] = DEFAULT_WORKOUTS[d].map(e=>({...e,done:false}));
      });
    }
    if (!currentDay || !gymData.days.includes(currentDay)) {
      currentDay = gymData.days[0];
    }
    exercises = (gymData.workouts[currentDay] || []).map(e=>({...e}));
    renderDayTabs();
    renderExercises();
    document.getElementById('sync-ind').textContent = 'SYNCED ✓';
  });

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderDayTabs() {
    const tabs = document.getElementById('day-tabs');
    tabs.innerHTML = '';
    gymData.days.forEach(day => {
      const btn = document.createElement('button');
      btn.className = 'day-tab' + (day===currentDay?' active':'');
      btn.onclick = () => switchDay(day);

      const label = document.createElement('span');
      label.textContent = day;
      btn.appendChild(label);

      if (loggedIn) {
        const del = document.createElement('button');
        del.className = 'day-tab-del';
        del.title = 'Delete day';
        del.textContent = '✕';
        del.onclick = (e) => { e.stopPropagation(); deleteDay(day); };
        btn.appendChild(del);
      }
      tabs.appendChild(btn);
    });
  }

  function renderExercises() {
    const list = document.getElementById('exercise-list');
    list.innerHTML = '';
    if (!exercises.length) {
      list.innerHTML = '<div class="empty-day">NO EXERCISES — ADD ONE BELOW</div>';
      updateStats(); return;
    }
    exercises.forEach((ex, i) => {
      const row = document.createElement('div');
      row.className = 'exercise-row';
      row.innerHTML = `
        <div><div class="ex-name">${ex.name}</div><div class="ex-muscle">${ex.muscle||''}</div></div>
        <div class="ex-cell">${ex.sets}</div>
        <div class="ex-cell">${ex.reps}</div>
        <div class="ex-cell">${ex.kg>0?ex.kg+'kg':'BW'}</div>
        ${loggedIn
          ? `<button class="done-btn ${ex.done?'done':''}" onclick="toggleDone(${i})">${ex.done?'✓':''}</button>`
          : `<div class="done-cell">${ex.done?'✓':'—'}</div>`}
        ${loggedIn ? `<button class="edit-btn" onclick="openEditExercise(${i})" title="Edit">✏️</button>` : '<div></div>'}
        ${loggedIn
          ? `<button class="trash-btn" onclick="deleteExercise(${i})">🗑</button>`
          : '<div></div>'}
      `;
      list.appendChild(row);
    });
    updateStats();
    anime({targets:'.exercise-row',opacity:[0,1],translateX:[-20,0],delay:anime.stagger(50),duration:350,easing:'easeOutQuart'});
  }

  function updateStats() {
    const done = exercises.filter(e=>e.done).length;
    const total = exercises.length;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-pct').textContent = total>0 ? Math.round((done/total)*100)+'%' : '0%';
  }

  // ── Actions ────────────────────────────────────────────────────────────────
  function switchDay(day) {
    currentDay = day;
    exercises = (gymData.workouts[day] || []).map(e=>({...e}));
    renderDayTabs();
    renderExercises();
  }

  function toggleDone(i) {
    if (!loggedIn) return;
    exercises[i].done = !exercises[i].done;
    renderExercises();
  }

  function deleteExercise(i) {
    if (!loggedIn) return;
    exercises.splice(i, 1);
    renderExercises();
  }

  function addExercise() {
    if (!loggedIn) return;
    const name = document.getElementById('ex-name').value.trim();
    if (!name) return;
    const muscleVal = document.getElementById('ex-muscle').value.trim().toUpperCase() || 'CUSTOM';
    exercises.push({
      name, muscle:muscleVal,
      sets: parseInt(document.getElementById('ex-sets').value)||3,
      reps: parseInt(document.getElementById('ex-reps').value)||10,
      kg: parseFloat(document.getElementById('ex-kg').value)||0,
      done: false
    });
    ['ex-name','ex-muscle','ex-sets','ex-reps','ex-kg'].forEach(id=>document.getElementById(id).value='');
    renderExercises();
  }

  function addDay() {
    if (!loggedIn) return;
    const name = document.getElementById('new-day-input').value.trim().toUpperCase();
    if (!name || gymData.days.includes(name)) return;
    gymData.days.push(name);
    gymData.workouts[name] = [];
    document.getElementById('new-day-input').value = '';
    currentDay = name;
    exercises = [];
    renderDayTabs();
    renderExercises();
  }

  function deleteDay(day) {
    if (!loggedIn || gymData.days.length <= 1) return;
    gymData.days = gymData.days.filter(d=>d!==day);
    delete gymData.workouts[day];
    if (currentDay === day) currentDay = gymData.days[0];
    exercises = (gymData.workouts[currentDay]||[]).map(e=>({...e}));
    renderDayTabs();
    renderExercises();
  }

  function openRenameDay() {
    document.getElementById('rename-input').value = currentDay;
    document.getElementById('rename-modal').classList.add('open');
    setTimeout(()=>document.getElementById('rename-input').focus(),100);
  }
  function closeRenameModal() { document.getElementById('rename-modal').classList.remove('open'); }
  function confirmRename() {
    if (!loggedIn) return;
    const newName = document.getElementById('rename-input').value.trim().toUpperCase();
    if (!newName || newName===currentDay || gymData.days.includes(newName)) { closeRenameModal(); return; }
    const idx = gymData.days.indexOf(currentDay);
    gymData.days[idx] = newName;
    gymData.workouts[newName] = gymData.workouts[currentDay];
    delete gymData.workouts[currentDay];
    currentDay = newName;
    closeRenameModal();
    renderDayTabs();
  }

  let editExIdx = -1;
  function openEditExercise(i) {
    if (!loggedIn) return;
    editExIdx = i;
    const ex = exercises[i];
    document.getElementById('edit-ex-name').value = ex.name;
    document.getElementById('edit-ex-muscle').value = ex.muscle||'';
    document.getElementById('edit-ex-sets').value = ex.sets;
    document.getElementById('edit-ex-reps').value = ex.reps;
    document.getElementById('edit-ex-kg').value = ex.kg;
    document.getElementById('edit-ex-modal').classList.add('open');
    setTimeout(()=>document.getElementById('edit-ex-name').focus(),100);
  }
  function confirmEditExercise() {
    if (editExIdx < 0) return;
    const name = document.getElementById('edit-ex-name').value.trim();
    if (!name) return;
    exercises[editExIdx] = {
      ...exercises[editExIdx],
      name,
      muscle: document.getElementById('edit-ex-muscle').value.trim().toUpperCase() || 'CUSTOM',
      sets: parseInt(document.getElementById('edit-ex-sets').value)||3,
      reps: parseInt(document.getElementById('edit-ex-reps').value)||10,
      kg: parseFloat(document.getElementById('edit-ex-kg').value)||0,
    };
    document.getElementById('edit-ex-modal').classList.remove('open');
    editExIdx = -1;
    renderExercises();
  }

  async function saveDay() {
    if (!loggedIn) return;
    gymData.workouts[currentDay] = exercises.map(e=>({...e}));
    document.getElementById('sync-ind').textContent = 'SAVING...';
    await dbSet('hub', 'gym', gymData);
    document.getElementById('sync-ind').textContent = 'SYNCED ✓';
    const toast = document.getElementById('save-toast');
    toast.textContent = currentDay+' SAVED ✓';
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2000);
    anime({targets:'.save-btn',scale:[1,0.95,1],duration:300,easing:'easeOutQuart'});
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  applyAuthUI();
  anime.timeline({easing:'easeOutExpo'})
    .add({targets:'.page-header',opacity:[0,1],translateY:[30,0],duration:700})
    .add({targets:'.stats-row',opacity:[0,1],translateY:[20,0],duration:600},'-=400')
    .add({targets:'#day-tabs-wrap',opacity:[0,1],translateY:[20,0],duration:600},'-=300')
    .add({targets:'.workout-panel',opacity:[0,1],translateY:[20,0],duration:600},'-=200');
  if (loggedIn) {
    anime({targets:'#add-section',opacity:[0,1],translateY:[20,0],duration:600,easing:'easeOutExpo'});
  }
  anime({targets:'.orb-1',translateX:[0,-50,0],translateY:[0,40,0],duration:9000,easing:'easeInOutSine',loop:true});
</script>
</body>
</html>
