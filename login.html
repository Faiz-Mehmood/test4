<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LOGIN — Faiz Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<script src="auth.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080b10;
    --surface: #111820;
    --border: #1e2a38;
    --accent: #00d4ff;
    --accent2: #7b61ff;
    --text: #e8f0fe;
    --muted: #4a6080;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; cursor: none; overflow: hidden; }

  #cursor { width:12px;height:12px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen; }
  #cursor-ring { width:36px;height:36px;border:1.5px solid var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:0.4; }

  #grid-bg { position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none; }

  .orb { position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none; }
  .orb-1 { width:500px;height:500px;background:#7b61ff;top:-150px;left:-150px;opacity:0.12; }
  .orb-2 { width:400px;height:400px;background:#00d4ff;bottom:-100px;right:-100px;opacity:0.1; }

  .card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 400px;
    opacity: 0;
    transform: translateY(30px);
  }

  .lock-icon {
    width: 60px; height: 60px;
    border-radius: 16px;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    margin: 0 auto 1.5rem;
  }

  .login-tag { font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:5px;color:var(--accent);text-align:center;margin-bottom:0.5rem; }
  h1 { font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:5px;text-align:center;margin-bottom:0.3rem;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
  .sub { font-size:0.78rem;color:var(--muted);text-align:center;margin-bottom:2rem;font-weight:300;letter-spacing:1px; }

  .field { margin-bottom:1rem; }
  .field label { font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:3px;color:var(--muted);display:block;margin-bottom:0.4rem; }
  .pw-wrap { position:relative; }
  .field input {
    width:100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 3rem 0.75rem 1rem;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 4px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.08); }
  .toggle-pw {
    position: absolute; right: 0.8rem; top: 50%;
    transform: translateY(-50%);
    background: transparent; border: none; color: var(--muted);
    font-size: 0.9rem; cursor: none; transition: color 0.2s;
  }
  .toggle-pw:hover { color: var(--accent); }

  .login-btn {
    width: 100%;
    padding: 0.85rem;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #080b10;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 4px;
    cursor: none;
    transition: opacity 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 20px rgba(0,212,255,0.25);
    margin-top: 0.5rem;
    font-weight: 700;
  }
  .login-btn:hover { opacity: 0.88; box-shadow: 0 0 32px rgba(0,212,255,0.4); }

  .error-msg {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 3px;
    color: #ff4d6d;
    text-align: center;
    margin-top: 1rem;
    height: 1rem;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .error-msg.show { opacity: 1; }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); }

  .visitor-note {
    margin-top: 1.5rem;
    padding: 0.8rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card" id="card">
  <div class="lock-icon">🔐</div>
  <div class="login-tag">// OWNER ACCESS</div>
  <h1>LOGIN</h1>
  <p class="sub">Enter your password to edit this hub.</p>

  <div class="field">
    <label>PASSWORD</label>
    <div class="pw-wrap">
      <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="toggle-pw" onclick="togglePw()" id="toggle-btn">👁</button>
    </div>
  </div>

  <button class="login-btn" onclick="doLogin()">ENTER HUB</button>
  <div class="error-msg" id="err">INCORRECT PASSWORD</div>

  <a class="back-link" id="back-link" href="index.html">← BACK TO HUB AS VISITOR</a>

  <div class="visitor-note">
    VISITORS CAN BROWSE ALL PAGES<br>EDITING IS RESTRICTED TO OWNER
  </div>
</div>

<script>
  // Cursor
  const cursor=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  function animCursor(){cursor.style.left=mx+'px';cursor.style.top=my+'px';rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animCursor);}
  animCursor();

  // Set back link based on ?from= param
  const params = new URLSearchParams(window.location.search);
  const fromPage = params.get('from') || 'index.html';
  document.getElementById('back-link').href = fromPage;

  // If already logged in, redirect
  if (isLoggedIn()) window.location.href = fromPage;

  function togglePw() {
    const inp = document.getElementById('pw-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function doLogin() {
    const pw = document.getElementById('pw-input').value;
    const ok = await checkLogin(pw);
    if (ok) {
      sessionStorage.setItem('faiz_auth', 'true');
      anime({ targets: '#card', scale: [1, 0.97, 1.02, 1], duration: 400, easing: 'easeOutQuart',
        complete: () => { window.location.href = fromPage; }
      });
    } else {
      const err = document.getElementById('err');
      err.classList.add('show');
      anime({ targets: '#card', translateX: [-8, 8, -6, 6, -4, 0], duration: 400, easing: 'linear' });
      document.getElementById('pw-input').value = '';
      setTimeout(() => err.classList.remove('show'), 3000);
    }
  }

  // Entrance animation
  anime({ targets: '#card', opacity: [0,1], translateY: [30,0], duration: 800, easing: 'easeOutExpo' });
  anime({ targets: '.orb-1', translateX:[0,60,0], translateY:[0,-40,0], duration:8000, easing:'easeInOutSine', loop:true });
</script>
</body>
</html>
